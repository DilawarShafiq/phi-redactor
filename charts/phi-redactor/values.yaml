# Default values for phi-redactor.
# Override with: helm install phi-redactor ./charts/phi-redactor -f my-values.yaml

# -- Number of proxy replicas.
# Note: for stateful vault consistency, use 1 replica unless you configure
# shared external storage for the vault database.
replicaCount: 1

image:
  repository: ghcr.io/dilawarshafiq/phi-redactor
  pullPolicy: IfNotPresent
  # -- Overrides the image tag. Defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created.
  create: true
  # -- Annotations to add to the service account.
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: phi-redactor.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: phi-redactor-tls
  #   hosts:
  #     - phi-redactor.example.com

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# -- Persistent volume for the encrypted vault database.
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  # -- Mount path inside the container.
  mountPath: /data/vault

# -- phi-redactor proxy configuration.
config:
  # -- Proxy listen port.
  port: 8080
  # -- Proxy bind host.
  host: "0.0.0.0"
  # -- Default upstream LLM provider. Options: openai, anthropic, azure, google.
  defaultProvider: "openai"
  # -- PHI detection sensitivity (0.0 = aggressive, 1.0 = permissive).
  sensitivity: "0.5"
  # -- Log level. Options: DEBUG, INFO, WARNING, ERROR.
  logLevel: "INFO"
  # -- spaCy model name. Use en_core_web_sm for lower memory, en_core_web_lg for accuracy.
  spacyModel: "en_core_web_sm"
  # -- Enable the web dashboard.
  dashboardEnabled: "false"
  # -- Session idle timeout in seconds.
  sessionIdleTimeout: "1800"
  # -- Session maximum lifetime in seconds.
  sessionMaxLifetime: "86400"

# -- Secrets — set these via --set or a sealed-secrets/ESO integration.
# Never commit real values to version control.
secrets:
  # -- Vault encryption passphrase. Auto-generated if empty.
  vaultPassphrase: ""
  # -- OpenAI API key (optional — clients can pass their own keys).
  openaiApiKey: ""
  # -- Anthropic API key (optional).
  anthropicApiKey: ""
  # -- Azure OpenAI endpoint (required for Azure provider).
  azureOpenaiEndpoint: ""
  # -- Azure OpenAI API key (required for Azure provider).
  azureOpenaiApiKey: ""
  # -- Azure OpenAI API version.
  azureOpenaiApiVersion: "2024-02-01"
  # -- Google API key (required for Google provider).
  googleApiKey: ""

# -- Liveness and readiness probe configuration.
probes:
  liveness:
    path: /api/v1/health
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readiness:
    path: /api/v1/health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
